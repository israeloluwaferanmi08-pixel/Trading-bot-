<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bot Dashboard — Sign in</title>
<style>
  :root{ --bg:#0b0f14; --panel:#121821; --line:#1f2733; --text:#e6edf3; --muted:#8b98a8; --accent:#5fd0a8; --danger:#e0667a; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  form{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:32px;width:320px;}
  h1{font-size:16px;font-weight:600;margin:0 0 4px;}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 20px;}
  input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);
        background:#0e141c;color:var(--text);font-size:14px;margin-bottom:14px;}
  input:focus{outline:none;border-color:var(--accent);}
  button{width:100%;padding:10px;border-radius:8px;border:none;background:var(--accent);
         color:#04140f;font-weight:600;font-size:14px;cursor:pointer;}
  button:hover{opacity:.9;}
  .error{color:var(--danger);font-size:13px;margin:-6px 0 14px;}
</style>
</head>
<body>
  <form method="get" action="{{ url_for('login') }}">
    <h1>Trading bot dashboard</h1>
    <p class="sub">Enter the dashboard token to continue. It was logged at startup and sent to your Telegram admin chat.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    <input type="password" name="token" placeholder="Dashboard token" autofocus>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
